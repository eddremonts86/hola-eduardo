# AI services (ollama, chromadb, llama.cpp) are shared at the workspace level.
# Start them with: docker compose -f <workspace>/docker-compose.yml --profile ai up -d
#
# Profiles:
#   standalone — start just the DB when workspace-postgres is not running
#                (handled automatically by `pnpm db:up`)
#   docker     — full Docker-based deployment (app + db together)
#
# Normal dev workflow:
#   pnpm db:up && pnpm dev

services:
  app:
    profiles: ['docker']
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: hola-eduardo-app
    env_file:
      - .env.development
    command: ['pnpm', 'dev:server', '--host', '0.0.0.0', '--port', '3000']
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - ./ia-config:/app/ia-config:ro
      - hola_eduardo_node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 25s

  db:
    profiles: ['standalone', 'docker']
    image: postgres:15-alpine
    container_name: hola-eduardo-db
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hola_eduardo
    volumes:
      - ./.docker_data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  hola_eduardo_node_modules:
