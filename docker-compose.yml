services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: tanstack-template-app
    env_file:
      - .env.development
      - .env.docker
    command: ['pnpm', 'dev:server', '--host', '0.0.0.0', '--port', '3000']
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - ./ia-config:/app/ia-config:ro
      - app_node_modules:/app/node_modules
    depends_on:
      lmstudio:
        condition: service_healthy
      chromadb:
        condition: service_started
      ollama:
        condition: service_healthy
      llama-cpp:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 25s

  lmstudio:
    image: lmstudio/llmster-preview:cpu
    platform: linux/amd64
    container_name: tanstack-template-lmstudio
    ports:
      - '1234:1234'
    volumes:
      - ./.docker_data/llm-models/lmstudio:/root/.cache/lm-studio/models
    healthcheck:
      test: ['CMD-SHELL', 'lms status || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  chromadb:
    image: chromadb/chroma:latest
    container_name: tanstack-template-chromadb
    ports:
      - '8000:8000'
    volumes:
      - ./.docker_data/chroma:/data
    environment:
      IS_PERSISTENT: 'TRUE'
      PERSIST_DIRECTORY: '/data'
      ANONYMIZED_TELEMETRY: 'FALSE'

  db:
    image: postgres:15-alpine
    container_name: tanstack-template-db
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tanstack_template
    volumes:
      - ./.docker_data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: tanstack-template-ollama
    ports:
      - '11434:11434'
    volumes:
      - ./.docker_data/llm-models/ollama:/root/.ollama
      - ./ia-config:/etc/ia-config:ro
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=*
    healthcheck:
      test: ['CMD', 'ollama', 'list']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  llama-cpp:
    image: ghcr.io/ggml-org/llama.cpp:server
    platform: linux/amd64
    container_name: tanstack-template-llama-cpp
    entrypoint: ['/bin/sh', '-lc']
    ports:
      - '8080:8080'
    volumes:
      - ./.docker_data/llm-models/llama-cpp:/models
      - ./ia-config:/etc/ia-config:ro
    command:
      - |
        MAIN_MODEL="$${LLAMA_CPP_MAIN_MODEL:-/models/qwen3.5-2b-instruct-q4_k_m.gguf}"
        DRAFT_MODEL="$${LLAMA_CPP_DRAFT_MODEL:-/models/qwen3.5-0.8b-instruct-q8_0.gguf}"
        CTX_SIZE="$${LLAMA_CPP_CTX_SIZE:-4096}"
        DRAFT_MAX="$${LLAMA_CPP_DRAFT_MAX:-16}"
        DRAFT_MIN="$${LLAMA_CPP_DRAFT_MIN:-4}"

        if [ ! -f "$${MAIN_MODEL}" ]; then
          FALLBACK_MODEL=$$(ls -1 /models/*.gguf 2>/dev/null | head -n 1 || true)
          if [ -n "$${FALLBACK_MODEL}" ]; then
            echo "[llama-cpp] main model not found, using fallback: $${FALLBACK_MODEL}"
            MAIN_MODEL="$${FALLBACK_MODEL}"
          else
            echo "[llama-cpp] no gguf models found in /models"
            exit 1
          fi
        fi

        ARGS="-m $${MAIN_MODEL} -c $${CTX_SIZE} --host 0.0.0.0 --port 8080"

        if [ "$${LLAMA_CPP_ENABLE_DRAFT:-1}" = "1" ] && [ -f "$${DRAFT_MODEL}" ]; then
          echo "[llama-cpp] using draft model: $${DRAFT_MODEL}"
          ARGS="$${ARGS} -md $${DRAFT_MODEL} --draft-max $${DRAFT_MAX} --draft-min $${DRAFT_MIN}"
        else
          echo "[llama-cpp] draft model disabled or missing: $${DRAFT_MODEL}"
        fi

        exec /app/llama-server $${ARGS}
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:8080/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

volumes:
  app_node_modules:
